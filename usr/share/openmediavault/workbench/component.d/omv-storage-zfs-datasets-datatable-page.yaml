version: "1.0"
type: component
data:
  name: omv-storage-zfs-datasets-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    rowId: id
    stateId: 2a3f8c10-50b3-11ec-bf5c-37dde54fc31c
    store:
      proxy:
        service: Zfs
        get:
          method: listDatasetsBg
          task: true
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Pool")
        prop: pool
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("Type")
        prop: type
        flexGrow: 1
        sortable: true
      - name: _("Size")
        prop: size
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
        hidden: true
      - name: _("Used")
        prop: used
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Used (%)")
        prop: usedpercent
        flexGrow: 1
        sortable: true
        hidden: true
        cellTemplateName: progressBar
        cellTemplateConfig:
          text: '{{ used | tobytes | binaryunit | notavailable("-") }}'
      - name: _("Available")
        prop: available
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Referenced")
        prop: refer
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Mountpoint")
        prop: mountpoint
        flexGrow: 2
        sortable: true
      - name: _("Path")
        prop: path
        flexGrow: 2
        sortable: true
        hidden: true
      - name: _("Encryption")
        prop: encryption
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("Key status")
        prop: keystatus
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("Auto-unlock")
        prop: autounlock
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
        hidden: true
      - name: _("Compression")
        prop: compression
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("Compress ratio")
        prop: compressratio
        flexGrow: 1
        sortable: true
      - name: _("Has children")
        prop: haschildren
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
        hidden: true
      - name: _("Has shares")
        prop: hasshares
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
        hidden: true
      - name: _("Pool root")
        prop: poolroot
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
        hidden: true
      - name: _("Origin")
        prop: origin
        flexGrow: 2
        sortable: true
        hidden: true
    actions:
      - type: menu
        icon: mdi:plus
        tooltip: _("Add")
        actions:
          - text: _("Add filesystem")
            icon: mdi:folder-plus-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: type
                  arg1: "Volume"
            execute:
              type: formDialog
              formDialog:
                title: _("Add filesystem")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: textInput
                    name: mountpoint
                    label: _("Mountpoint")
                    value: ""
                    hint: _("Optional mountpoint. Default is to use the dataset path.")
                  - type: select
                    name: compression
                    label: _("Compression")
                    value: ""
                    store:
                      data:
                        - ["", _("Inherit from parent")]
                        - ["lz4", "lz4 (recommended)"]
                        - ["zstd", "zstd"]
                        - ["gzip", "gzip"]
                        - ["off", "off"]
                        - ["lzjb", "lzjb"]
                        - ["zle", "zle"]
                  - type: select
                    name: recordsize
                    label: _("Record size")
                    value: ""
                    hint: _("Use default (128K) for general use. Use 4K-16K for databases, 1M for large files/media.")
                    store:
                      data:
                        - ["", _("Default (128K)")]
                        - ["4K", "4K"]
                        - ["8K", "8K"]
                        - ["16K", "16K"]
                        - ["32K", "32K"]
                        - ["64K", "64K"]
                        - ["128K", "128K"]
                        - ["256K", "256K"]
                        - ["512K", "512K"]
                        - ["1M", "1M"]
                  - type: hidden
                    name: type
                    value: "filesystem"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding filesystem ...")
                        successNotification: _("Filesystem added.")
          - text: _("Add encrypted filesystem")
            icon: mdi:folder-key
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: type
                  arg1: "Volume"
            execute:
              type: formDialog
              formDialog:
                title: _("Add encrypted filesystem")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: select
                    name: encryptiontype
                    label: _("Algorithm")
                    value: "aes-256-gcm"
                    store:
                      data:
                        - ["aes-128-ccm", "AES-128-CCM"]
                        - ["aes-192-ccm", "AES-192-CCM"]
                        - ["aes-256-ccm", "AES-256-CCM"]
                        - ["aes-128-gcm", "AES-128-GCM"]
                        - ["aes-192-gcm", "AES-192-GCM"]
                        - ["aes-256-gcm", "AES-256-GCM (recommended)"]
                  - type: passwordInput
                    name: key
                    label: _("Passphrase")
                    value: ""
                    validators:
                      required: true
                      minLength: 8
                  - type: passwordInput
                    name: keyconfirm
                    label: _("Confirm passphrase")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: key
                            arg1:
                              prop: keyconfirm
                          errorData: _("Passphrases do not match.")
                  - type: checkbox
                    name: autounlock
                    label: _("Auto-unlock at boot")
                    value: false
                    hint: _("Saves the passphrase unencrypted to /etc/zfs/keys/ so the dataset unlocks automatically on startup. Protects against drive theft but not theft of the whole server.")
                  - type: select
                    name: compression
                    label: _("Compression")
                    value: ""
                    store:
                      data:
                        - ["", _("Inherit from parent")]
                        - ["lz4", "lz4 (recommended)"]
                        - ["zstd", "zstd"]
                        - ["gzip", "gzip"]
                        - ["off", "off"]
                        - ["lzjb", "lzjb"]
                        - ["zle", "zle"]
                  - type: select
                    name: recordsize
                    label: _("Record size")
                    value: ""
                    hint: _("Use default (128K) for general use. Use 4K-16K for databases, 1M for large files/media.")
                    store:
                      data:
                        - ["", _("Default (128K)")]
                        - ["4K", "4K"]
                        - ["8K", "8K"]
                        - ["16K", "16K"]
                        - ["32K", "32K"]
                        - ["64K", "64K"]
                        - ["128K", "128K"]
                        - ["256K", "256K"]
                        - ["512K", "512K"]
                        - ["1M", "1M"]
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: enableEncryption
                        progressMessage: _("Creating encrypted filesystem ...")
                        successNotification: _("Encrypted filesystem created.")
          - text: _("Add volume")
            icon: mdi:harddisk-plus
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: type
                  arg1: "Volume"
            execute:
              type: formDialog
              formDialog:
                title: _("Add volume")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: binaryUnitInput
                    name: size
                    label: _("Size")
                    value: 2097152
                    validators:
                      min: 1024
                      required: true
                  - type: checkbox
                    name: thinvol
                    label: _("Thin provisioning")
                    value: false
                  - type: hidden
                    name: type
                    value: "volume"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding volume ...")
                        successNotification: _("Volume added.")
          - text: _("Add snapshot")
            icon: mdi:camera-plus-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add snapshot")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: hidden
                    name: type
                    value: "snapshot"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding snapshot ...")
                        successNotification: _("Snapshot added.")
          - text: _("Quick snapshot")
            icon: mdi:camera
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: request
              request:
                service: Zfs
                method: quickSnapshot
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Creating snapshot ...")
                successNotification: _("Snapshot created.")
      - type: iconButton
        icon: mdi:desktop-classic
        tooltip: _("Properties")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/dataset-properties?name={{ _selected[0].path | encodeuricomponent }}&type={{ _selected[0].type }}"
      - type: iconButton
        icon: mdi:information-outline
        tooltip: _("Details")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/details/{{ _selected[0].path | encodeuricomponent }}/{{ _selected[0].type }}"
      - type: menu
        icon: mdi:database-edit-outline
        tooltip: _("Dataset")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        actions:
          - text: _("Rename")
            icon: mdi:rename-box
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: falsy
                  arg0:
                    prop: poolroot
                - operator: falsy
                  arg0:
                    prop: hasshares
            execute:
              type: formDialog
              formDialog:
                title: _("Rename dataset")
                fields:
                  - type: textInput
                    name: oldpath
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: hidden
                    name: oldname
                    value: "{{ _selected[0].name }}"
                  - type: hidden
                    name: type
                    value: "{{ _selected[0].type }}"
                  - type: textInput
                    name: newname
                    label: _("New name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                buttons:
                  submit:
                    text: _("Rename")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: renameObject
                        progressMessage: _("Renaming dataset ...")
                        successNotification: _("Dataset renamed.")
          - text: _("Clone")
            icon: mdi:content-copy
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: falsy
                  arg0:
                    prop: poolroot
            execute:
              type: formDialog
              formDialog:
                title: _("Clone dataset")
                fields:
                  - type: textInput
                    name: name
                    label: _("Source dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: clonename
                    label: _("Clone name")
                    value: ""
                    hint: _("Name of the new clone, created in the same parent as the source.")
                    validators:
                      required: true
                      patternType: shareName
                buttons:
                  submit:
                    text: _("Clone")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: cloneDataset
                        progressMessage: _("Cloning dataset ...")
                        successNotification: _("Dataset cloned.")
          - text: _("Promote")
            icon: mdi:arrow-up-circle-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: origin
                  arg1: "n/a"
            confirmationDialogConfig:
              template: confirmation
              message: _("Are you sure you want to promote this dataset? This detaches the clone from its origin snapshot dependency.")
            execute:
              type: request
              request:
                service: Zfs
                method: promoteDataset
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Promoting dataset ...")
                successNotification: _("Dataset promoted.")
      - type: menu
        icon: mdi:lock
        tooltip: _("Encryption")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: ne
              arg0:
                prop: encryption
              arg1: "OFF"
        actions:
          - text: _("Load key (unlock)")
            icon: mdi:lock-open
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: keystatus
                  arg1: "available"
            execute:
              type: formDialog
              formDialog:
                title: _("Load encryption key")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: passwordInput
                    name: key
                    label: _("Passphrase / key")
                    value: ""
                    validators:
                      required: true
                buttons:
                  submit:
                    text: _("Load key")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: loadEncryptionKey
                        progressMessage: _("Loading encryption key ...")
                        successNotification: _("Encryption key loaded.")
          - text: _("Unload key (lock)")
            icon: mdi:lock
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: eq
                  arg0:
                    prop: keystatus
                  arg1: "available"
            confirmationDialogConfig:
              template: confirmation
              message: _("Are you sure you want to unload the encryption key? The dataset will become inaccessible until it is unlocked again.")
            execute:
              type: request
              request:
                service: Zfs
                method: unloadEncryptionKey
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Unloading encryption key ...")
                successNotification: _("Encryption key unloaded.")
          - text: _("Enable auto-unlock — local file")
            icon: mdi:lock-clock
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: falsy
                  arg0:
                    prop: autounlock
            execute:
              type: formDialog
              formDialog:
                title: _("Enable auto-unlock at boot (local file)")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: hidden
                    name: keyloctype
                    value: "local"
                  - type: hint
                    hintType: info
                    text: _("The passphrase will be saved unencrypted to /etc/zfs/keys/ on this machine. Protects against drive theft but not theft of the whole server.")
                  - type: passwordInput
                    name: key
                    label: _("Passphrase / key")
                    value: ""
                    validators:
                      required: true
                  - type: passwordInput
                    name: keyconfirm
                    label: _("Confirm passphrase / key")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: key
                            arg1:
                              prop: keyconfirm
                          errorData: _("Passphrases do not match.")
                buttons:
                  submit:
                    text: _("Enable auto-unlock")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: setAutoUnlock
                        progressMessage: _("Enabling auto-unlock ...")
                        successNotification: _("Auto-unlock enabled. The key will be loaded from the local keyfile at boot.")
          - text: _("Enable auto-unlock — remote HTTPS")
            icon: mdi:lock-clock
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: falsy
                  arg0:
                    prop: autounlock
            execute:
              type: formDialog
              formDialog:
                title: _("Enable auto-unlock at boot (remote HTTPS)")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: hidden
                    name: keyloctype
                    value: "remote"
                  - type: hint
                    hintType: info
                    text: _("The passphrase will be fetched from a remote HTTPS server at boot. The key is never stored on this machine, protecting against theft of the whole server. Requires network access during boot.")
                  - type: textInput
                    name: remoteurl
                    label: _("Key URL")
                    value: ""
                    placeholder: "https://192.168.1.50/keys/dataset.key"
                    validators:
                      required: true
                      pattern:
                        pattern: "^https://.+"
                        errorData: _("URL must start with https://")
                  - type: checkbox
                    name: insecure
                    label: _("Skip certificate verification")
                    value: false
                    hint: _("Allow self-signed or untrusted certificates. Use only on trusted local networks.")
                  - type: passwordInput
                    name: decrypt_passphrase
                    label: _("Decryption passphrase (optional)")
                    value: ""
                    hint: _("If set, the remote server must serve an OpenSSL-encrypted key. Generate the encrypted value by running -- echo -n 'YOUR_KEY' | openssl enc -aes-256-cbc -pbkdf2 -base64 -pass pass:DECRYPTION_PASSPHRASE")
                  - type: numberInput
                    name: network_timeout
                    label: _("Network timeout (seconds)")
                    value: 60
                    hint: _("How long to wait for network access before giving up. Increase if your network is slow to come up at boot.")
                    validators:
                      min: 10
                      max: 600
                buttons:
                  submit:
                    text: _("Enable auto-unlock")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: setAutoUnlock
                        progressMessage: _("Enabling auto-unlock ...")
                        successNotification: _("Remote auto-unlock enabled. The key will be fetched at boot.")
          - text: _("Disable auto-unlock at boot")
            icon: mdi:lock-remove
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: truthy
                  arg0:
                    prop: autounlock
            confirmationDialogConfig:
              template: confirmation-critical
              message: _("Are you sure you want to disable auto-unlock? The saved key or remote URL configuration will be removed and you will need to enter the passphrase manually after each reboot.")
            execute:
              type: request
              request:
                service: Zfs
                method: removeAutoUnlock
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Disabling auto-unlock ...")
                successNotification: _("Auto-unlock disabled.")
          - text: _("Change encryption key")
            icon: mdi:key-change
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: encryption
                  arg1: "OFF"
            execute:
              type: formDialog
              formDialog:
                title: _("Change encryption key")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: passwordInput
                    name: oldkey
                    label: _("Current passphrase / key")
                    value: ""
                    validators:
                      required: true
                  - type: passwordInput
                    name: newkey
                    label: _("New passphrase / key")
                    value: ""
                    validators:
                      required: true
                  - type: passwordInput
                    name: newkeyconfirm
                    label: _("Confirm new passphrase / key")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: newkey
                            arg1:
                              prop: newkeyconfirm
                          errorData: _("New passphrases do not match.")
                buttons:
                  submit:
                    text: _("Change key")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: changeEncryptionKey
                        progressMessage: _("Changing encryption key ...")
                        successNotification: _("Encryption key changed.")
      - type: menu
        icon: mdi:magnify-plus-outline
        tooltip: _("Discover")
        actions:
          - text: _("Add new")
            icon: mdi:magnify-plus-outline
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: true
                  deleteStale: false
                task: true
                progressMessage: _("Adding missing ZFS mntent entries ...")
                successNotification: _("Missing ZFS mntent entries added.")
          - text: _("Add new + delete missing")
            icon: mdi:magnify-scan
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: true
                  deleteStale: true
                task: true
                progressMessage: _("Synchronising ZFS mntent entries ...")
                successNotification: _("ZFS mntent entries synchronised.")
          - text: _("Delete missing")
            icon: mdi:magnify-minus-outline
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: false
                  deleteStale: true
                task: true
                progressMessage: _("Removing stale ZFS mntent entries ...")
                successNotification: _("Stale ZFS mntent entries removed.")
      - type: iconButton
        icon: mdi:folder-wrench-outline
        tooltip: _("Fix packages")
        execute:
          type: request
          request:
            service: Zfs
            method: fixPackages
            task: false
            progressMessage: _("Fixing packages ...")
            successNotification: _("Packages fixed.")
      - type: iconButton
        tooltip: _("Delete")
        icon: mdi:delete
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: falsy
              arg0:
                prop: haschildren
            - operator: falsy
              arg0:
                prop: hasshares
            - operator: falsy
              arg0:
                prop: poolroot
        confirmationDialogConfig:
          template: confirmation-critical
          message: _("Are you sure you want to delete?")
        execute:
          type: request
          request:
            service: Zfs
            method: deleteObjectBg
            params:
              name: "{{ _selected[0].path }}"
              mp: "{{ _selected[0].mountpoint }}"
              type: "{{ _selected[0].type }}"
            task: true
            progressMessage: _("Deleting object ...")
            successNotification: _("Object deleted.")
