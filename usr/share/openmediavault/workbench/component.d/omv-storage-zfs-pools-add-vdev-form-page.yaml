version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-add-vdev-form-page
  type: formPage
  config:
    request:
      service: Zfs
      post:
        method: addVdev
        confirmationDialogConfig:
          template: confirmation
          message: _("Are you sure you want to add this device to the pool?")
    fields:
      - type: textInput
        name: pool
        label: _("Pool")
        value: "{{ _routeParams.pool }}"
        readonly: true
      - type: select
        name: vdevtype
        label: _("Device type")
        value: "cache"
        store:
          data:
            - ["cache", _("Cache (L2ARC)")]
            - ["log", _("Log (ZIL/SLOG)")]
            - ["spare", _("Hot spare")]
            - ["special", _("Special (metadata)")]
      - type: hint
        hintType: info
        text: '_("Log (ZIL/SLOG): if no log device exists yet, a single device is added. If one already exists, the new device is automatically mirrored with it using zpool attach (creating or extending a mirror). To create a log mirror from scratch add the first device, then add the second.")'
        modifiers:
          - type: visible
            constraint:
              operator: eq
              arg0:
                prop: vdevtype
              arg1: "log"
      - type: hint
        hintType: warning
        text: '_("Special (metadata): stores pool metadata and optionally small blocks on faster devices, improving IOPS for the entire pool. WARNING: losing a non-redundant special vdev causes immediate pool corruption and data loss. If no special device exists yet, a single device is added. If one already exists, the new device is automatically mirrored with it — add the first device then the second to build a redundant special vdev.")'
        modifiers:
          - type: visible
            constraint:
              operator: eq
              arg0:
                prop: vdevtype
              arg1: "special"
      - type: select
        name: device
        label: _("Device")
        valueField: devicefile
        textField: devicefile
        store:
          proxy:
            service: Zfs
            get:
              method: getEmptyCandidates
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
      - type: select
        name: devalias
        label: _("Device alias")
        value: "id"
        store:
          data:
            - ["id", _("By ID")]
            - ["path", _("By Path")]
            - ["dev", _("None")]
        hint: _("Specifies which device alias should be used.")
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/zfs/pools"
      - template: cancel
        execute:
          type: url
          url: "/storage/zfs/pools"
