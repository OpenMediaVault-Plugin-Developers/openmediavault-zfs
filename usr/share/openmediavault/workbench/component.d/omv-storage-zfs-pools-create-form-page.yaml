version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-create-form-page
  type: formPage
  config:
    request:
      service: Zfs
      post:
        method: addPool
    fields:
      - type: hidden
        name: uuid
        value: "{{ newconfobjuuid }}"
      - type: textInput
        name: name
        label: _("Name")
        value: ""
        validators:
          required: true
          patternType: shareName
      - type: select
        name: pooltype
        label: _("Pool type")
        value: "raidz1"
        store:
          data:
            - ["basic", _("Basic")]
            - ["mirror", _("Mirror")]
            - ["raidz1", _("RAID-Z1")]
            - ["raidz2", _("RAID-Z2")]
            - ["raidz3", _("RAID-Z3")]
      - type: select
        name: devices
        label: _("Devices")
        multiple: true
        valueField: devicefile
        textField: devicefile
        store:
          proxy:
            service: Zfs
            get:
              method: getEmptyCandidates
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
          custom:
            - constraint:
                operator: if
                arg0:
                  operator: eq
                  arg0:
                    prop: pooltype
                  arg1: "mirror"
                arg1:
                  operator: '>='
                  arg0:
                    operator: length
                    arg0:
                      prop: devices
                  arg1: 2
              errorData: _("At least two devices are required.")
            - constraint:
                operator: if
                arg0:
                  operator: eq
                  arg0:
                    prop: pooltype
                  arg1: "raidz1"
                arg1:
                  operator: '>='
                  arg0:
                    operator: length
                    arg0:
                      prop: devices
                  arg1: 3
              errorData: _("At least three devices are required.")
            - constraint:
                operator: if
                arg0:
                  operator: eq
                  arg0:
                    prop: pooltype
                  arg1: "raidz2"
                arg1:
                  operator: '>='
                  arg0:
                    operator: length
                    arg0:
                      prop: devices
                  arg1: 4
              errorData: _("At least four devices are required.")
            - constraint:
                operator: if
                arg0:
                  operator: eq
                  arg0:
                    prop: pooltype
                  arg1: "raidz3"
                arg1:
                  operator: '>='
                  arg0:
                    operator: length
                    arg0:
                      prop: devices
                  arg1: 5
              errorData: _("At least five devices are required.")
      - type: textInput
        name: mountpoint
        label: _("Mountpoint")
        value: ""
        hint: _("Optional mountpoint for the pool. Default is to use the pool name.")
      - type: select
        name: devalias
        label: _("Device alias")
        value: "id"
        store:
          data:
            - ["id", _("By ID")]
            - ["path", _("By Path")]
            - ["dev", _("None")]
        hint: _("Specifies which device alias should be used. Don't change unless needed.")
      - type: checkbox
        name: force
        label: _("Force creation")
        value: false
        hint: _("Forces the creation of the pool even if errors are reported. Use with extreme caution!")
      - type: container
        fields:
          - type: checkbox
            name: ashift
            label: _("Set ashift")
            value: false
            hint: _("Specify ashift value. Only use if you are sure you need it.")
          - type: numberInput
            name: ashiftval
            label: _("Ashift value")
            value: 12
            validators:
              min: 0
              max: 16
              patternType: integer
              required: true
            modifiers:
              - type: visible
                constraint:
                  operator: truthy
                  arg0:
                    prop: ashift
      - type: container
        fields:
          - type: checkbox
            name: compress
            label: _("Compression")
            value: false
          - type: select
            name: compresstype
            label: _("Compression type")
            textField: path
            valueField: path
            value: "lz4"
            store:
              proxy:
                service: Zfs
                get:
                  method: listCompressionTypes
            modifiers:
              - type: visible
                constraint:
                  operator: truthy
                  arg0:
                    prop: compress
      - type: divider
        title: _("Encryption")
      - type: checkbox
        name: encrypt
        label: _("Enable encryption")
        value: false
        hint: _("Encrypts the pool root dataset. All child datasets will inherit encryption by default.")
      - type: select
        name: encryptiontype
        label: _("Algorithm")
        value: "aes-256-gcm"
        store:
          data:
            - ["aes-128-ccm", "AES-128-CCM"]
            - ["aes-192-ccm", "AES-192-CCM"]
            - ["aes-256-ccm", "AES-256-CCM"]
            - ["aes-128-gcm", "AES-128-GCM"]
            - ["aes-192-gcm", "AES-192-GCM"]
            - ["aes-256-gcm", "AES-256-GCM (recommended)"]
        modifiers:
          - type: visible
            constraint:
              operator: truthy
              arg0:
                prop: encrypt
      - type: passwordInput
        name: key
        label: _("Passphrase")
        value: ""
        validators:
          custom:
            - constraint:
                operator: if
                arg0:
                  operator: truthy
                  arg0:
                    prop: encrypt
                arg1:
                  operator: gte
                  arg0:
                    operator: length
                    arg0:
                      prop: key
                  arg1: 8
              errorData: _("Passphrase must be at least 8 characters.")
        modifiers:
          - type: visible
            constraint:
              operator: truthy
              arg0:
                prop: encrypt
      - type: passwordInput
        name: keyconfirm
        label: _("Confirm passphrase")
        value: ""
        validators:
          custom:
            - constraint:
                operator: if
                arg0:
                  operator: truthy
                  arg0:
                    prop: encrypt
                arg1:
                  operator: eq
                  arg0:
                    prop: key
                  arg1:
                    prop: keyconfirm
              errorData: _("Passphrases do not match.")
        modifiers:
          - type: visible
            constraint:
              operator: truthy
              arg0:
                prop: encrypt
      - type: checkbox
        name: autounlock
        label: _("Auto-unlock at boot")
        value: false
        hint: _("Saves the passphrase to /etc/zfs/keys/ so the pool unlocks automatically on startup. Ensure your system disk is secured.")
        modifiers:
          - type: visible
            constraint:
              operator: truthy
              arg0:
                prop: encrypt
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/zfs/pools"
      - template: cancel
        execute:
          type: url
          url: "/storage/zfs/pools"
