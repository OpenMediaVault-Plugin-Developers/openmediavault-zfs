version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    rowId: id
    stateId: fc0545e0-50b2-11ec-bf5c-37dde54fc31c
    store:
      proxy:
        service: Zfs
        get:
          method: listPoolsOnlyBg
          task: true
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Size")
        prop: size
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Alloc")
        prop: usedpercent
        flexGrow: 1
        sortable: true
        cellTemplateName: progressBar
        cellTemplateConfig:
          text: '{{ used | tobytes | binaryunit | notavailable("-") }}'
      - name: _("Free")
        prop: available
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Frag")
        prop: fragmentation
        flexGrow: 1
        sortable: true
        cellTemplateName: progressBar
        cellTemplateConfig:
          text: '{{ fragmentation }}%'
      - name: _("Cap")
        prop: capacity
        flexGrow: 1
        sortable: true
        cellTemplateName: progressBar
        cellTemplateConfig:
          text: '{{ capacity }}%'
      - name: _("Dedup")
        prop: dedup
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("Health")
        prop: state
        flexGrow: 1
        sortable: true
      - name: _("Status")
        prop: status
        flexGrow: 1
        sortable: true
      - name: _("Has children")
        prop: haschildren
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
        hidden: true
      - name: _("Scrub state")
        prop: scrubstate
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("Last scrub")
        prop: lastscrub
        flexGrow: 2
        sortable: true
        hidden: true
    actions:
      - type: menu
        icon: mdi:database
        tooltip: _("Pool")
        actions:
          - text: _("Add pool")
            icon: mdi:database-plus
            execute:
              type: url
              url: "/storage/zfs/pools/create"
          - text: _("Expand pool")
            icon: mdi:database-arrow-right
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/expand/{{ _selected[0].name }}"
          - text: _("Add cache / log / spare")
            icon: mdi:plus-circle-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/add-vdev/{{ _selected[0].path | encodeuricomponent }}"
          - text: _("Clear errors")
            icon: mdi:broom
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: request
              request:
                service: Zfs
                method: clearPool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Clearing pool errors ...")
                successNotification: _("Pool errors cleared.")
          - text: _("Trim")
            icon: mdi:content-cut
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            confirmationDialogConfig:
              template: confirmation
              message: _("Are you sure you want to start a TRIM operation on this pool? This is only meaningful for SSD-backed pools.")
            execute:
              type: request
              request:
                service: Zfs
                method: trimPool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Starting TRIM ...")
                successNotification: _("TRIM started.")
          - text: _("Upgrade")
            icon: mdi:arrow-up-bold-circle-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            confirmationDialogConfig:
              template: confirmation-critical
              message: _("Are you sure you want to upgrade this pool? This enables new feature flags and cannot be undone. The pool will no longer be accessible by older ZFS versions.")
            execute:
              type: request
              request:
                service: Zfs
                method: upgradePool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Upgrading pool ...")
                successNotification: _("Pool upgraded.")
      - type: menu
        icon: mdi:plus
        tooltip: _("Add")
        actions:
          - text: _("Add filesystem")
            icon: mdi:folder-plus-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add filesystem")
                fields:
                  - type: textInput
                    name: path
                    label: _("Pool")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: textInput
                    name: mountpoint
                    label: _("Mountpoint")
                    value: ""
                    hint: _("Optional mountpoint. Default is to use the dataset path.")
                  - type: select
                    name: compression
                    label: _("Compression")
                    value: ""
                    store:
                      data:
                        - ["", _("Inherit from parent")]
                        - ["lz4", "lz4 (recommended)"]
                        - ["zstd", "zstd"]
                        - ["gzip", "gzip"]
                        - ["off", "off"]
                        - ["lzjb", "lzjb"]
                        - ["zle", "zle"]
                  - type: select
                    name: recordsize
                    label: _("Record size")
                    value: ""
                    hint: _("Use default (128K) for general use. Use 4K-16K for databases, 1M for large files/media.")
                    store:
                      data:
                        - ["", _("Default (128K)")]
                        - ["4K", "4K"]
                        - ["8K", "8K"]
                        - ["16K", "16K"]
                        - ["32K", "32K"]
                        - ["64K", "64K"]
                        - ["128K", "128K"]
                        - ["256K", "256K"]
                        - ["512K", "512K"]
                        - ["1M", "1M"]
                  - type: hidden
                    name: type
                    value: "filesystem"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding filesystem ...")
                        successNotification: _("Filesystem added.")
          - text: _("Add encrypted filesystem")
            icon: mdi:folder-key
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add encrypted filesystem")
                fields:
                  - type: textInput
                    name: path
                    label: _("Pool")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: select
                    name: encryptiontype
                    label: _("Algorithm")
                    value: "aes-256-gcm"
                    store:
                      data:
                        - ["aes-128-ccm", "AES-128-CCM"]
                        - ["aes-192-ccm", "AES-192-CCM"]
                        - ["aes-256-ccm", "AES-256-CCM"]
                        - ["aes-128-gcm", "AES-128-GCM"]
                        - ["aes-192-gcm", "AES-192-GCM"]
                        - ["aes-256-gcm", "AES-256-GCM (recommended)"]
                  - type: passwordInput
                    name: key
                    label: _("Passphrase")
                    value: ""
                    validators:
                      required: true
                      minLength: 8
                  - type: passwordInput
                    name: keyconfirm
                    label: _("Confirm passphrase")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: key
                            arg1:
                              prop: keyconfirm
                          errorData: _("Passphrases do not match.")
                  - type: checkbox
                    name: autounlock
                    label: _("Auto-unlock at boot")
                    value: false
                    hint: _("Saves the passphrase to /etc/zfs/keys/ so the dataset unlocks automatically on startup.")
                  - type: select
                    name: compression
                    label: _("Compression")
                    value: ""
                    store:
                      data:
                        - ["", _("Inherit from parent")]
                        - ["lz4", "lz4 (recommended)"]
                        - ["zstd", "zstd"]
                        - ["gzip", "gzip"]
                        - ["off", "off"]
                        - ["lzjb", "lzjb"]
                        - ["zle", "zle"]
                  - type: select
                    name: recordsize
                    label: _("Record size")
                    value: ""
                    hint: _("Use default (128K) for general use. Use 4K-16K for databases, 1M for large files/media.")
                    store:
                      data:
                        - ["", _("Default (128K)")]
                        - ["4K", "4K"]
                        - ["8K", "8K"]
                        - ["16K", "16K"]
                        - ["32K", "32K"]
                        - ["64K", "64K"]
                        - ["128K", "128K"]
                        - ["256K", "256K"]
                        - ["512K", "512K"]
                        - ["1M", "1M"]
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: enableEncryption
                        progressMessage: _("Creating encrypted filesystem ...")
                        successNotification: _("Encrypted filesystem created.")
          - text: _("Add volume")
            icon: mdi:harddisk-plus
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add volume")
                fields:
                  - type: textInput
                    name: path
                    label: _("Pool")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: binaryUnitInput
                    name: size
                    label: _("Size")
                    value: 2097152
                    validators:
                      min: 1024
                      required: true
                  - type: checkbox
                    name: thinvol
                    label: _("Thin provisioning")
                    value: false
                  - type: hidden
                    name: type
                    value: "volume"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding volume ...")
                        successNotification: _("Volume added.")
      - type: menu
        icon: mdi:swap-horizontal
        tooltip: _("Import / Export")
        actions:
          - text: _("zpool import")
            icon: mdi:import
            execute:
              type: formDialog
              formDialog:
                title: _("Import pool(s)")
                fields:
                  - type: checkbox
                    name: all
                    label: _("Import all available pools")
                    value: false
                    hint: _("Scan for and import all pools not currently imported.")
                  - type: textInput
                    name: poolname
                    label: _("Pool name")
                    value: ""
                    hint: _("Name of the specific pool to import.")
                    modifiers:
                      - type: visible
                        constraint:
                          operator: falsy
                          arg0:
                            prop: all
                  - type: divider
                  - type: checkbox
                    name: force
                    label: _("Force import")
                    value: false
                    hint: _("Force import even if the pool appears to be in use or was not cleanly exported.")
                buttons:
                  submit:
                    text: _("Import")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: importPool
                        progressMessage: _("Importing pool ...")
                        successNotification: _("Pool imported.")
          - text: _("zpool export")
            icon: mdi:export
            confirmationDialogConfig:
              template: confirmation-critical
              message: _("Are you sure you want to export?")
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: request
              request:
                service: Zfs
                method: exportPool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Exporting pool ...")
                successNotification: _("Pool exported.")
      - type: iconButton
        icon: mdi:desktop-classic
        tooltip: _("Properties")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/pools/properties/{{ _selected[0].path | encodeuricomponent }}/{{ _selected[0].type }}"
      - type: iconButton
        icon: mdi:information-outline
        tooltip: _("Details")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/details/{{ _selected[0].path | encodeuricomponent }}/{{ _selected[0].type }}"
      - type: iconButton
        icon: mdi:history
        tooltip: _("History")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/pools/history/{{ _selected[0].path | encodeuricomponent }}"
      - type: menu
        icon: mdi:progress-wrench
        tooltip: _("Scrub")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        actions:
          - text: _("Start scrub")
            icon: mdi:play
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: ne
                  arg0:
                    prop: scrubstate
                  arg1: "running"
                - operator: ne
                  arg0:
                    prop: scrubstate
                  arg1: "paused"
            confirmationDialogConfig:
              template: confirmation
              message: _("Are you sure you want to start a scrub?")
            execute:
              type: request
              request:
                service: Zfs
                method: scrubPool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Starting scrub ...")
                successNotification: _("Scrub started.")
          - text: _("Stop scrub")
            icon: mdi:stop
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: truthy
                  arg0:
                    prop: scrubactive
            confirmationDialogConfig:
              template: confirmation
              message: _("Are you sure you want to stop the scrub?")
            execute:
              type: request
              request:
                service: Zfs
                method: stopScrub
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Stopping scrub ...")
                successNotification: _("Scrub stopped.")
          - text: _("Pause scrub")
            icon: mdi:pause
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: eq
                  arg0:
                    prop: scrubstate
                  arg1: "running"
            execute:
              type: request
              request:
                service: Zfs
                method: pauseScrub
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Pausing scrub ...")
                successNotification: _("Scrub paused.")
          - text: _("Resume scrub")
            icon: mdi:play-pause
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: eq
                  arg0:
                    prop: scrubstate
                  arg1: "paused"
            execute:
              type: request
              request:
                service: Zfs
                method: scrubPool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Resuming scrub ...")
                successNotification: _("Scrub resumed.")
          - text: _("Scrub status")
            icon: mdi:information-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/scrub-status/{{ _selected[0].path | encodeuricomponent }}"
      - type: menu
        icon: mdi:harddisk
        tooltip: _("Devices")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        actions:
          - text: _("Offline device")
            icon: mdi:harddisk-remove
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/device-offline/{{ _selected[0].path | encodeuricomponent }}"
          - text: _("Online device")
            icon: mdi:harddisk-plus
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/device-online/{{ _selected[0].path | encodeuricomponent }}"
          - text: _("Detach device")
            icon: mdi:link-off
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/device-detach/{{ _selected[0].path | encodeuricomponent }}"
          - text: _("Replace device")
            icon: mdi:swap-horizontal
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/device-replace/{{ _selected[0].path | encodeuricomponent }}"
          - text: _("Attach device")
            icon: mdi:link-plus
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: url
              url: "/storage/zfs/pools/device-attach/{{ _selected[0].path | encodeuricomponent }}"
      - type: menu
        icon: mdi:magnify-plus-outline
        tooltip: _("Discover")
        actions:
          - text: _("Add new")
            icon: mdi:magnify-plus-outline
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: true
                  deleteStale: false
                task: true
                progressMessage: _("Adding missing ZFS mntent entries ...")
                successNotification: _("Missing ZFS mntent entries added.")
          - text: _("Add new + delete missing")
            icon: mdi:magnify-scan
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: true
                  deleteStale: true
                task: true
                progressMessage: _("Synchronising ZFS mntent entries ...")
                successNotification: _("ZFS mntent entries synchronised.")
          - text: _("Delete missing")
            icon: mdi:magnify-minus-outline
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: false
                  deleteStale: true
                task: true
                progressMessage: _("Removing stale ZFS mntent entries ...")
                successNotification: _("Stale ZFS mntent entries removed.")
      - type: iconButton
        icon: mdi:folder-wrench-outline
        tooltip: _("Fix packages")
        execute:
          type: request
          request:
            service: Zfs
            method: fixPackages
            task: false
            progressMessage: _("Fixing packages ...")
            successNotification: _("Packages fixed.")
      - type: iconButton
        tooltip: _("Delete")
        icon: mdi:delete
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: falsy
              arg0:
                prop: haschildren
            - operator: falsy
              arg0:
                prop: hasshares
        confirmationDialogConfig:
          template: confirmation-critical
          message: _("Are you sure you want to delete?")
        execute:
          type: request
          request:
            service: Zfs
            method: deleteObjectBg
            params:
              name: "{{ _selected[0].path }}"
              mp: "{{ _selected[0].mountpoint }}"
              type: "{{ _selected[0].type }}"
            task: true
            progressMessage: _("Deleting pool ...")
            successNotification: _("Pool deleted.")
      - type: menu
        icon: mdi:link
        tooltip: _("Docs")
        actions:
          - text: _("omv-extras.org wiki")
            icon: mdi:link-box-variant-outline
            execute:
              type: url
              url: '/externalRedirect/https%3A%2F%2Fwiki.omv-extras.org%2Fdoku.php%3Fid%3Domv8%3Aomv8_plugins%3Azfs'
