version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    rowId: id
    stateId: fc0545e0-50b2-11ec-bf5c-37dde54fc31c
    store:
      proxy:
        service: Zfs
        get:
          method: listPoolsBg
          task: true
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Type")
        prop: type
        flexGrow: 1
        sortable: true
      - name: _("Size")
        prop: size
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Used")
        prop: usedpercent
        flexGrow: 1
        sortable: true
        cellTemplateName: progressBar
        cellTemplateConfig:
          text: '{{ used | tobytes | binaryunit | notavailable("-") }}'
      - name: _("Available")
        prop: available
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Mountpoint")
        prop: mountpoint
        flexGrow: 2
        sortable: true
      - name: _("Path")
        prop: path
        flexGrow: 2
        sortable: true
        hidden: true
      - name: _("State")
        prop: state
        flexGrow: 1
        sortable: true
      - name: _("Status")
        prop: status
        flexGrow: 1
        sortable: true
      - name: _("Encryption")
        prop: encryption
        flexGrow: 1
        sortable: true
        hidden: false
      - name: _("Key status")
        prop: keystatus
        flexGrow: 1
        sortable: true
        hidden: true
    actions:
      - type: menu
        icon: mdi:database
        tooltip: _("Pool")
        actions:
          - text: _("Add pool")
            icon: mdi:database-plus
            execute:
              type: url
              url: "/storage/zfs/pools/create"
          - text: _("Expand pool")
            icon: mdi:database-arrow-right
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: eq
                  arg0:
                    prop: type
                  arg1: "Pool"
            execute:
              type: url
              url: "/storage/zfs/pools/expand/{{ _selected[0].name }}"
      - type: menu
        icon: mdi:plus
        tooltip: _("Add")
        actions:
          - text: _("Add filesystem")
            icon: mdi:folder-plus-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add filesystem")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: textInput
                    name: mountpoint
                    label: _("Mountpoint")
                    value: ""
                    hint: _("Optional mountpoint. Default is to use the dataset path.")
                  - type: hidden
                    name: type
                    value: "filesystem"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding filesystem ...")
                        successNotification: _("Filesystem added.")
          - text: _("Add encrypted filesystem")
            icon: mdi:folder-key
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add encrypted filesystem")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: select
                    name: encryptiontype
                    label: _("Algorithm")
                    value: "aes-256-gcm"
                    store:
                      data:
                        - ["aes-128-ccm", "AES-128-CCM"]
                        - ["aes-192-ccm", "AES-192-CCM"]
                        - ["aes-256-ccm", "AES-256-CCM"]
                        - ["aes-128-gcm", "AES-128-GCM"]
                        - ["aes-192-gcm", "AES-192-GCM"]
                        - ["aes-256-gcm", "AES-256-GCM (recommended)"]
                  - type: passwordInput
                    name: key
                    label: _("Passphrase")
                    value: ""
                    validators:
                      required: true
                      minLength: 8
                  - type: passwordInput
                    name: keyconfirm
                    label: _("Confirm passphrase")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: key
                            arg1:
                              prop: keyconfirm
                          errorData: _("Passphrases do not match.")
                  - type: checkbox
                    name: autounlock
                    label: _("Auto-unlock at boot")
                    value: false
                    hint: _("Saves the passphrase to /etc/zfs/keys/ so the dataset unlocks automatically on startup.")
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: enableEncryption
                        progressMessage: _("Creating encrypted filesystem ...")
                        successNotification: _("Encrypted filesystem created.")
          - text: _("Add volume")
            icon: mdi:harddisk-plus
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add volume")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: binaryUnitInput
                    name: size
                    label: _("Size")
                    value: 2097152
                    validators:
                      min: 1024
                      required: true
                  - type: checkbox
                    name: thinvol
                    label: _("Thin provisioning")
                    value: false
                  - type: hidden
                    name: type
                    value: "volume"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding volume ...")
                        successNotification: _("Volume added.")
          - text: _("Add snapshot")
            icon: mdi:camera-plus-outline
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
            execute:
              type: formDialog
              formDialog:
                title: _("Add snapshot")
                fields:
                  - type: textInput
                    name: path
                    label: _("Prefix")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: textInput
                    name: name
                    label: _("Name")
                    value: ""
                    validators:
                      required: true
                      patternType: shareName
                  - type: hidden
                    name: type
                    value: "snapshot"
                buttons:
                  submit:
                    text: _("Add")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: addObject
                        progressMessage: _("Adding snapshot ...")
                        successNotification: _("Snapshot added.")
      - type: menu
        icon: mdi:swap-horizontal
        tooltip: _("Import / Export")
        actions:
          - text: _("zpool import")
            icon: mdi:import
            execute:
              type: formDialog
              formDialog:
                title: _("Import pool(s)")
                fields:
                  - type: checkbox
                    name: all
                    label: _("Import all available pools")
                    value: false
                    hint: _("Scan for and import all pools not currently imported.")
                  - type: textInput
                    name: poolname
                    label: _("Pool name")
                    value: ""
                    hint: _("Name of the specific pool to import.")
                    modifiers:
                      - type: visible
                        constraint:
                          operator: falsy
                          arg0:
                            prop: all
                  - type: divider
                  - type: checkbox
                    name: force
                    label: _("Force import")
                    value: false
                    hint: _("Force import even if the pool appears to be in use or was not cleanly exported.")
                buttons:
                  submit:
                    text: _("Import")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: importPool
                        progressMessage: _("Importing pool ...")
                        successNotification: _("Pool imported.")
          - text: _("zpool export")
            icon: mdi:export
            confirmationDialogConfig:
              template: confirmation-critical
              message: _("Are you sure you want to export?")
            enabledConstraints:
              minSelected: 1
              maxSelected: 1
              constraint:
                - operator: eq
                  arg0:
                    prop: type
                  arg1: "Pool"
            execute:
              type: request
              request:
                service: Zfs
                method: exportPool
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Exporting pool ...")
                successNotification: _("Pool exported.")
      - type: iconButton
        icon: mdi:desktop-classic
        tooltip: _("Properties")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/pools/properties/{{ _selected[0].path | encodeuricomponent }}/{{ _selected[0].type }}"
      - type: iconButton
        icon: mdi:information-outline
        tooltip: _("Details")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/pools/details/{{ _selected[0].path | encodeuricomponent }}/{{ _selected[0].type }}"
      - type: iconButton
        icon: mdi:progress-wrench
        tooltip: _("Scrub")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: eq
              arg0:
                prop: type
              arg1: "Pool"
        confirmationDialogConfig:
          template: confirmation
          message: _("Are you sure you want to scrub this pool?")
        execute:
          type: request
          request:
            service: Zfs
            method: scrubPool
            params:
              name: "{{ _selected[0].path }}"
            task: false
            progressMessage: _("Scrubbing pool ...")
            successNotification: _("Pool scrub started.")
      - type: menu
        icon: mdi:lock
        tooltip: _("Encryption")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: ne
              arg0:
                prop: encryption
              arg1: "OFF"
        actions:
          - text: _("Load key (unlock)")
            icon: mdi:lock-open
            execute:
              type: formDialog
              formDialog:
                title: _("Load encryption key")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: passwordInput
                    name: key
                    label: _("Passphrase / key")
                    value: ""
                    validators:
                      required: true
                buttons:
                  submit:
                    text: _("Load key")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: loadEncryptionKey
                        progressMessage: _("Loading encryption key ...")
                        successNotification: _("Encryption key loaded.")
          - text: _("Unload key (lock)")
            icon: mdi:lock
            confirmationDialogConfig:
              template: confirmation
              message: _("Are you sure you want to unload the encryption key? The dataset will become inaccessible until it is unlocked again.")
            execute:
              type: request
              request:
                service: Zfs
                method: unloadEncryptionKey
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Unloading encryption key ...")
                successNotification: _("Encryption key unloaded.")
          - text: _("Enable auto-unlock at boot")
            icon: mdi:lock-clock
            execute:
              type: formDialog
              formDialog:
                title: _("Enable auto-unlock at boot")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: hint
                    hintType: info
                    text: _("The passphrase will be saved to /etc/zfs/keys/ and ZFS will load it automatically at boot. Ensure your system disk is secured.")
                  - type: passwordInput
                    name: key
                    label: _("Passphrase / key")
                    value: ""
                    validators:
                      required: true
                  - type: passwordInput
                    name: keyconfirm
                    label: _("Confirm passphrase / key")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: key
                            arg1:
                              prop: keyconfirm
                          errorData: _("Passphrases do not match.")
                buttons:
                  submit:
                    text: _("Enable auto-unlock")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: setAutoUnlock
                        progressMessage: _("Enabling auto-unlock ...")
                        successNotification: _("Auto-unlock enabled. The key will be loaded automatically at boot.")
          - text: _("Disable auto-unlock at boot")
            icon: mdi:lock-remove
            confirmationDialogConfig:
              template: confirmation-critical
              message: _("Are you sure you want to disable auto-unlock? The saved keyfile will be deleted and you will need to enter the passphrase manually after each reboot.")
            execute:
              type: request
              request:
                service: Zfs
                method: removeAutoUnlock
                params:
                  name: "{{ _selected[0].path }}"
                task: false
                progressMessage: _("Disabling auto-unlock ...")
                successNotification: _("Auto-unlock disabled. Keyfile removed.")
          - text: _("Change encryption key")
            icon: mdi:key-change
            execute:
              type: formDialog
              formDialog:
                title: _("Change encryption key")
                fields:
                  - type: textInput
                    name: name
                    label: _("Dataset")
                    value: "{{ _selected[0].path }}"
                    readonly: true
                  - type: passwordInput
                    name: oldkey
                    label: _("Current passphrase / key")
                    value: ""
                    validators:
                      required: true
                  - type: passwordInput
                    name: newkey
                    label: _("New passphrase / key")
                    value: ""
                    validators:
                      required: true
                  - type: passwordInput
                    name: newkeyconfirm
                    label: _("Confirm new passphrase / key")
                    value: ""
                    validators:
                      required: true
                      custom:
                        - constraint:
                            operator: eq
                            arg0:
                              prop: newkey
                            arg1:
                              prop: newkeyconfirm
                          errorData: _("New passphrases do not match.")
                buttons:
                  submit:
                    text: _("Change key")
                    execute:
                      type: request
                      request:
                        service: Zfs
                        method: changeEncryptionKey
                        progressMessage: _("Changing encryption key ...")
                        successNotification: _("Encryption key changed.")
      - type: menu
        icon: mdi:magnify-plus-outline
        tooltip: _("Discover")
        actions:
          - text: _("Add new")
            icon: mdi:magnify-plus-outline
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: true
                  deleteStale: false
                task: true
                progressMessage: _("Adding missing ZFS mntent entries ...")
                successNotification: _("Missing ZFS mntent entries added.")
          - text: _("Add new + delete missing")
            icon: mdi:magnify-scan
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: true
                  deleteStale: true
                task: true
                progressMessage: _("Synchronising ZFS mntent entries ...")
                successNotification: _("ZFS mntent entries synchronised.")
          - text: _("Delete missing")
            icon: mdi:magnify-minus-outline
            execute:
              type: request
              request:
                service: Zfs
                method: doDiscoverBg
                params:
                  addMissing: false
                  deleteStale: true
                task: true
                progressMessage: _("Removing stale ZFS mntent entries ...")
                successNotification: _("Stale ZFS mntent entries removed.")
      - type: iconButton
        icon: mdi:folder-wrench-outline
        tooltip: _("Fix packages")
        execute:
          type: request
          request:
            service: Zfs
            method: fixPackages
            task: false
            progressMessage: _("Fixing packages ...")
            successNotification: _("Packages fixed.")
      - type: iconButton
        tooltip: _("Delete")
        icon: mdi:delete
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        confirmationDialogConfig:
          template: confirmation-critical
          message: _("Are you sure you want to delete?")
        execute:
          type: request
          request:
            service: Zfs
            method: deleteObjectBg
            params:
              name: "{{ _selected[0].path }}"
              mp: "{{ _selected[0].mountpoint }}"
              type: "{{ _selected[0].type }}"
            task: true
            progressMessage: _("Deleting object ...")
            successNotification: _("Object deleted.")
