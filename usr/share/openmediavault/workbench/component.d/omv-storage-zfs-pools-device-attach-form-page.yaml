version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-device-attach-form-page
  type: formPage
  config:
    request:
      service: Zfs
      post:
        method: deviceAttach
        confirmationDialogConfig:
          template: confirmation-critical
          message: _("Are you sure? Attaching permanently converts the selected device's vdev slot into a mirror. On a striped pool this changes the pool layout and cannot be undone without a full pool recreation. To expand a stripe, use 'Add vdev' instead.")
    fields:
      - type: textInput
        name: pool
        label: _("Pool")
        value: "{{ _routeParams.pool }}"
        readonly: true
      - type: hint
        hintType: warning
        text: _("WARNING: 'Attach' converts the chosen existing device into a 2-way mirror vdev. On a striped pool this permanently alters the pool layout. To add a new stripe member use 'Add vdev' instead.")
      - type: select
        name: olddevice
        label: _("Existing pool device")
        valueField: devicefile
        textField: label
        hint: _("The new device will be mirrored with this existing device.")
        store:
          proxy:
            service: Zfs
            get:
              method: getPoolDevices
              params:
                name: "{{ _routeParams.pool }}"
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
      - type: select
        name: newdevice
        label: _("New device to attach")
        valueField: devicefile
        textField: devicefile
        store:
          proxy:
            service: Zfs
            get:
              method: getEmptyCandidates
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/zfs/pools"
      - template: cancel
        execute:
          type: url
          url: "/storage/zfs/pools"
