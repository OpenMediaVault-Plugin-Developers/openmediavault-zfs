version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-device-attach-form-page
  type: formPage
  config:
    request:
      service: Zfs
      post:
        method: deviceAttach
        confirmationDialogConfig:
          template: confirmation-critical
          message: _("Are you sure? On a mirror pool this extends the mirror by one device (N-way → N+1-way). On a striped pool this converts the chosen stripe device into a 2-way mirror, permanently changing the pool layout in a way that cannot be undone without a full pool recreation — use 'Add vdev' instead to expand a stripe.")
    fields:
      - type: textInput
        name: pool
        label: _("Pool")
        value: "{{ _routeParams.pool }}"
        readonly: true
      - type: hint
        hintType: warning
        text: '_("On a mirror pool, attach extends the selected mirror vdev by one device (e.g. 2-way → 3-way mirror). On a striped pool it converts the chosen device into a 2-way mirror — this permanently changes the pool layout. To add a new stripe member use Add vdev instead.")'
      - type: select
        name: olddevice
        label: _("Existing pool device")
        valueField: devicefile
        textField: label
        hint: _("The new device will be mirrored with this existing device.")
        store:
          proxy:
            service: Zfs
            get:
              method: getPoolDevices
              params:
                name: "{{ _routeParams.pool }}"
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
      - type: select
        name: newdevice
        label: _("New device to attach")
        valueField: devicefile
        textField: devicefile
        store:
          proxy:
            service: Zfs
            get:
              method: getEmptyCandidates
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/zfs/pools"
      - template: cancel
        execute:
          type: url
          url: "/storage/zfs/pools"
