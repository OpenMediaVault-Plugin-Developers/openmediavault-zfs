version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-device-attach-form-page
  type: formPage
  config:
    request:
      service: Zfs
      post:
        method: deviceAttach
        confirmationDialogConfig:
          template: confirmation-critical
          message: _("Are you sure? For a mirror or stripe pool this attaches the new device to the selected existing device, extending the mirror or converting a stripe device into a 2-way mirror (irreversible without full pool recreation). For a RAIDZ pool this expands the selected RAIDZ vdev by adding one device, permanently increasing its width.")
    fields:
      - type: textInput
        name: pool
        label: _("Pool")
        value: "{{ _routeParams.pool }}"
        readonly: true
      - type: hint
        hintType: info
        text: '_("Select the anchor and the new device to attach. Mirror/stripe pools: select an existing member device — the new device will be mirrored with it (e.g. 2-way → 3-way mirror, or stripe → 2-way mirror). RAIDZ pools: select the RAIDZ vdev name (e.g. raidz1-0) to expand it — requires OpenZFS 2.3+ with feature@raidz_expansion active. To add a completely new vdev to any pool use Add vdev instead.")'
      - type: select
        name: olddevice
        label: _("Anchor (existing device or RAIDZ vdev)")
        valueField: devicefile
        textField: label
        hint: _("Mirror/stripe: choose the existing device to attach to. RAIDZ: choose the vdev name shown as [RAIDZ expansion].")
        store:
          proxy:
            service: Zfs
            get:
              method: getAttachAnchors
              params:
                name: "{{ _routeParams.pool }}"
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
      - type: select
        name: newdevice
        label: _("New device to attach")
        valueField: devicefile
        textField: devicefile
        store:
          proxy:
            service: Zfs
            get:
              method: getEmptyCandidates
          sorters:
            dir: asc
            prop: devicefile
        validators:
          required: true
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/zfs/pools"
      - template: cancel
        execute:
          type: url
          url: "/storage/zfs/pools"
