version: "1.0"
type: component
data:
  name: omv-storage-zfs-pools-vdev-remove-form-page
  type: formPage
  config:
    request:
      service: Zfs
      post:
        method: removeVdev
        confirmationDialogConfig:
          template: confirmation-critical
          message: '_("Are you sure? For data vdevs (mirror, stripe), ZFS will evacuate all data to the remaining pool vdevs — this can take a long time and requires sufficient free space. For log, cache, spare, or special vdevs, the device is simply detached without data migration.")'
    fields:
      - type: textInput
        name: pool
        label: _("Pool")
        value: "{{ _routeParams.pool }}"
        readonly: true
      - type: hint
        hintType: warning
        text: '_("For data vdevs (mirror, stripe), removal evacuates all data to the remaining pool vdevs — ensure the pool has sufficient free space. For log, cache, spare, or special vdevs, the device is simply detached and no data migration occurs. Raidz vdevs cannot be removed.")'
      - type: select
        name: vdev
        label: _("Vdev to remove")
        valueField: vdev
        textField: label
        store:
          proxy:
            service: Zfs
            get:
              method: getTopLevelVdevs
              params:
                name: "{{ _routeParams.pool }}"
          sorters:
            dir: asc
            prop: vdev
        validators:
          required: true
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/zfs/pools"
      - template: cancel
        execute:
          type: url
          url: "/storage/zfs/pools"
