version: "1.0"
type: component
data:
  name: omv-storage-zfs-scrubjobs-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    stateId: b2c3d4e5-f6a7-8901-bcde-f12345678901
    store:
      proxy:
        service: Zfs
        get:
          method: getScrubJobList
    columns:
      - name: _("Enabled")
        prop: enable
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
      - name: _("Pool")
        prop: pool
        flexGrow: 2
        sortable: true
      - name: _("Scheduling")
        prop: ""
        flexGrow: 2
        cellTemplateName: template
        cellTemplateConfig: |
          {% if execution == "exactly" %}
          {% set _minute = minute %}
          {% set _hour = hour %}
          {% set _dayofmonth = dayofmonth %}
          {% if everynminute %}{% set _minute %}*/{{ minute }}{% endset %}{% endif %}
          {% if everynhour %}{% set _hour %}*/{{ hour }}{% endset %}{% endif %}
          {% if everyndayofmonth %}{% set _dayofmonth %}*/{{ dayofmonth }}{% endset %}{% endif %}
          {{ [_minute, _hour, _dayofmonth, month, dayofweek] | join(" ") | cron2human }}
          {% else %}
          {{ execution | capitalize | translate }}
          {% endif %}
      - name: _("Comment")
        prop: comment
        flexGrow: 2
        sortable: true
    actions:
      - template: create
        execute:
          type: url
          url: "/storage/zfs/scrubjobs/create"
      - template: edit
        execute:
          type: url
          url: "/storage/zfs/scrubjobs/edit/{{ _selected[0].uuid }}"
      - template: delete
        execute:
          type: request
          request:
            service: Zfs
            method: deleteScrubJob
            params:
              uuid: "{{ _selected[0].uuid }}"
      - type: iconButton
        tooltip: _("Run now")
        icon: mdi:play-box-outline
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: request
          request:
            service: Zfs
            method: runScrubJob
            params:
              uuid: "{{ _selected[0].uuid }}"
            task: false
            progressMessage: _("Starting scrub ...")
            successNotification: _("Scrub started. Monitor progress in the Pools tab.")
