version: "1.0"
type: component
data:
  name: omv-storage-zfs-snapshots-datatable-page
  type: datatablePage
  config:
    hasSearchField: true
    rowId: id
    stateId: af51b038-513b-11ec-b91a-1bce262337ed
    store:
      proxy:
        service: Zfs
        get:
          method: getAllSnapshotsBg
          task: true
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Parent")
        prop: parent
        flexGrow: 1
        sortable: true
      - name: _("Used")
        prop: used
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Refer")
        prop: refer
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
      - name: _("Path")
        prop: path
        flexGrow: 2
        sortable: true
      - name: _("Type")
        prop: type
        flexGrow: 1
        sortable: true
    actions:
      - type: iconButton
        icon: mdi:information-outline
        tooltip: _("Details")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/details/{{ _selected[0].path | encodeuricomponent }}/{{ _selected[0].type }}"
      - type: iconButton
        icon: mdi:file-compare
        tooltip: _("Diff")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: url
          url: "/storage/zfs/snapshots/diff/{{ _selected[0].path | encodeuricomponent }}"
      - type: iconButton
        tooltip: _("Delete")
        icon: mdi:delete
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        confirmationDialogConfig:
          template: confirmation
          message: _("Are you sure you want to delete to this snapshot?")
        execute:
          type: request
          request:
            service: Zfs
            method: deleteObjectBg
            params:
              name: "{{ _selected[0].path }}"
              type: "{{ _selected[0].type }}"
            task: true
            progressMessage: _("Deleting snapshot ...")
            successNotification: _("Snapshot deleted.")
      - type: iconButton
        tooltip: _("Clone")
        icon: mdi:content-copy
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: formDialog
          formDialog:
            title: _("Clone snapshot")
            fields:
              - type: textInput
                name: pool
                label: _("Source pool")
                value: "{{ _selected[0].parent | split('/') | first }}"
                readonly: true
              - type: textInput
                name: name
                label: _("Source name")
                value: "{{ _selected[0].name }}"
                readonly: true
              - type: textInput
                name: path
                label: _("Source path")
                value: "{{ _selected[0].path }}"
                readonly: true
              - type: textInput
                name: clonename
                label: _("Clone path (within pool)")
                hint: _("May include sub-datasets, e.g. secure/clone1")
                value: ""
                validators:
                  required: true
                  custom:
                    - constraint:
                        operator: ne
                        arg0:
                          prop: name
                        arg1:
                          prop: clonename
                        errorData: _("A different name must be specified.")
              - type: hidden
                name: type
                value: "clone"
            buttons:
              submit:
                text: _("Clone")
                execute:
                  type: request
                  request:
                    service: Zfs
                    method: addObject
                    progressMessage: _("Cloning snapshot ...")
                    successNotification: _("Snapshot cloned.")
      - type: iconButton
        tooltip: _("Rollback")
        icon: mdi:arrow-u-left-top
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        confirmationDialogConfig:
          template: confirmation
          message: _("Are you sure you want to rollback to this snapshot?")
        execute:
          type: request
          request:
            service: Zfs
            method: rollbackSnapshot
            params:
              name: "{{ _selected[0].path }}"
            task: false
            progressMessage: _("Rolling back snapshot ...")
            successNotification: _("Snapshot rolled back.")
